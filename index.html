<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIS ARG — Ops Panel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .header {
    width: 100%;
    max-width: 420px;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 32px;
    height: 32px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #6c8eff;
    letter-spacing: -0.5px;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 600;
    color: #e8e8e8;
    letter-spacing: -0.2px;
  }

  .header-text p {
    font-size: 12px;
    color: #666;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  input[type="password"] {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 15px;
    color: #e8e8e8;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 0.75rem;
  }

  input[type="password"]:focus {
    border-color: #6c8eff;
  }

  button {
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: #6c8eff;
    color: #fff;
  }

  .btn-primary:hover:not(:disabled) { opacity: 0.85; }

  .btn-action {
    background: #1e2a1e;
    color: #5cb85c;
    border: 1px solid #2a3a2a;
    margin-top: 0.5rem;
  }

  .btn-action:hover:not(:disabled) { background: #243024; }

  .btn-danger {
    background: #2a1e1e;
    color: #e05c5c;
    border: 1px solid #3a2a2a;
    margin-top: 0.5rem;
  }

  .btn-danger:hover:not(:disabled) { background: #301e1e; }

  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0;
    border-bottom: 1px solid #222;
  }

  .status-row:last-child { border-bottom: none; }

  .status-key {
    font-size: 13px;
    color: #666;
  }

  .status-val {
    font-size: 13px;
    color: #e8e8e8;
    font-weight: 500;
    text-align: right;
    max-width: 60%;
    word-break: break-all;
  }

  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .badge-green { background: #1a2e1a; color: #5cb85c; border: 1px solid #2a3e2a; }
  .badge-red { background: #2e1a1a; color: #e05c5c; border: 1px solid #3e2a2a; }
  .badge-amber { background: #2e251a; color: #e0a05c; border: 1px solid #3e351a; }
  .badge-gray { background: #222; color: #888; border: 1px solid #333; }

  .error-msg {
    background: #2a1a1a;
    border: 1px solid #3a2a2a;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-size: 13px;
    color: #e05c5c;
    margin-top: 0.75rem;
  }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #333;
    border-top-color: #6c8eff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: #444;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin: 1.25rem 0 0.75rem;
  }

  .client-tag {
    display: inline-block;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #6c8eff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.4px;
    margin-bottom: 1rem;
  }

  #login-section { display: block; }
  #panel-section { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">DA</div>
  <div class="header-text">
    <h1>DIS ARG — Ops Panel</h1>
    <p>Infrastructure control</p>
  </div>
</div>

<div id="login-section" class="card">
  <div class="card-label">Acceso</div>
  <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" />
  <button class="btn-primary" onclick="login()">Ingresar</button>
  <div id="login-error"></div>
</div>

<div id="panel-section">
  <div class="card">
    <div class="card-label">Cliente</div>
    <div class="client-tag">cascadas</div>

    <div class="section-title">Base de datos</div>
    <button class="btn-action" onclick="getRdsStatus()" id="btn-rds">
      Consultar estado de RDS
    </button>

    <div id="rds-result"></div>
  </div>

  <div style="text-align:center; margin-top:1rem;">
    <button onclick="logout()" style="background:none;border:none;color:#444;font-size:12px;cursor:pointer;width:auto;padding:0.5rem 1rem;">
      Cerrar sesión
    </button>
  </div>
</div>

<script>
const API_URL = "https://nr8qjpcl4d.execute-api.us-east-1.amazonaws.com/prod/action";
let sessionPassword = "";

document.getElementById("password").addEventListener("keydown", function(e) {
  if (e.key === "Enter") login();
});

function login() {
  const pwd = document.getElementById("password").value;
  if (!pwd) return;
  sessionPassword = pwd;
  document.getElementById("login-section").style.display = "none";
  document.getElementById("panel-section").style.display = "block";
}

function logout() {
  sessionPassword = "";
  document.getElementById("password").value = "";
  document.getElementById("login-error").innerHTML = "";
  document.getElementById("rds-result").innerHTML = "";
  document.getElementById("login-section").style.display = "block";
  document.getElementById("panel-section").style.display = "none";
}

async function callApi(action) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: sessionPassword, action })
  });
  const data = await res.json();
  if (res.status === 401) throw new Error("Contraseña incorrecta");
  if (!res.ok) throw new Error(data.error || "Error desconocido");
  return data;
}

function statusBadge(status) {
  if (status === "available") return `<span class="badge badge-green">${status}</span>`;
  if (status === "stopped") return `<span class="badge badge-red">${status}</span>`;
  if (["starting","stopping","rebooting","backing-up"].includes(status))
    return `<span class="badge badge-amber">${status}</span>`;
  return `<span class="badge badge-gray">${status}</span>`;
}

async function getRdsStatus() {
  const btn = document.getElementById("btn-rds");
  const result = document.getElementById("rds-result");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Consultando...';
  result.innerHTML = "";

  try {
    const data = await callApi("rds_status");
    result.innerHTML = `
      <div style="margin-top:1rem;">
        <div class="status-row">
          <span class="status-key">Estado</span>
          <span class="status-val">${statusBadge(data.status)}</span>
        </div>
        <div class="status-row">
          <span class="status-key">Instancia</span>
          <span class="status-val">${data.class}</span>
        </div>
        <div class="status-row">
          <span class="status-key">Motor</span>
          <span class="status-val">${data.engine}</span>
        </div>
        <div class="status-row">
          <span class="status-key">Storage</span>
          <span class="status-val">${data.storage_gb} GB</span>
        </div>
        <div class="status-row">
          <span class="status-key">Multi-AZ</span>
          <span class="status-val">${data.multi_az ? "Sí" : "No"}</span>
        </div>
        <div class="status-row">
          <span class="status-key">Endpoint</span>
          <span class="status-val" style="font-size:11px;color:#555;">${data.endpoint}</span>
        </div>
      </div>
    `;
  } catch(e) {
    result.innerHTML = `<div class="error-msg">${e.message}</div>`;
    if (e.message === "Contraseña incorrecta") logout();
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Consultar estado de RDS";
  }
}
</script>
</body>
</html>
