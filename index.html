<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DIS ARG Ops</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0a;color:#e8e8e8;min-height:100vh}
.hdr{padding:1.25rem;display:flex;align-items:center;gap:12px;border-bottom:1px solid #1a1a1a}
.logo{width:40px;height:40px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#6c8eff;flex-shrink:0}
.hdr h1{font-size:18px;font-weight:700}
.hdr p{font-size:12px;color:#555}
.ubadge{margin-left:auto;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:20px;padding:4px 12px;font-size:13px;color:#6c8eff;font-weight:600;flex-shrink:0;display:none}
#login-section{padding:2rem 1.25rem}
.lcrd{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:2rem}
.lcrd h2{font-size:24px;font-weight:700;margin-bottom:8px}
.lcrd p{font-size:17px;color:#666;margin-bottom:2rem}
.btn-gh{width:100%;padding:1rem;border-radius:12px;border:1px solid #333;background:#1a1a1a;color:#e8e8e8;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px}
.btn-gh svg{width:24px;height:24px;fill:#e8e8e8;flex-shrink:0}
#dash-section{display:none;padding:1.25rem}
.dash-hdr{font-size:12px;font-weight:600;color:#444;letter-spacing:.8px;text-transform:uppercase;margin-bottom:1rem}
.ref-btn{width:100%;padding:1rem;border-radius:12px;border:1px solid #222;background:#111;color:#666;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:1.25rem}
.ccrd{background:#1a1a1a;border:2px solid #2a2a2a;border-radius:16px;padding:1.25rem;margin-bottom:.75rem;cursor:pointer}
.ccrd:active{transform:scale(.98)}
.ccrd.green{border-color:#2a3e2a}
.ccrd.amber{border-color:#3e351a}
.ccrd.red{border-color:#3e2a2a}
.ccrd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cname{font-size:26px;font-weight:800;color:#e8e8e8}
.sem{width:20px;height:20px;border-radius:50%;background:#333;flex-shrink:0}
.sem.green{background:#5cb85c;box-shadow:0 0 10px #5cb85c88}
.sem.amber{background:#e0a05c;box-shadow:0 0 10px #e0a05c88}
.sem.red{background:#e05c5c;box-shadow:0 0 10px #e05c5c88}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{background:#111;border:1px solid #222;border-radius:8px;padding:6px 12px;font-size:15px;color:#666;font-weight:600}
.pill.ok{color:#5cb85c}
.pill.warn{color:#e0a05c}
.pill.crit{color:#e05c5c}
#detail-section{display:none;padding:1.25rem}
.back{display:flex;align-items:center;gap:8px;background:none;border:none;color:#6c8eff;font-size:16px;font-weight:600;cursor:pointer;padding:0 0 1.25rem 0}
.dname{font-size:32px;font-weight:800;margin-bottom:1.5rem}
.slbl{font-size:12px;font-weight:600;color:#444;letter-spacing:.8px;text-transform:uppercase;margin:1.25rem 0 .5rem}
.bact{width:100%;padding:1.1rem;border-radius:12px;border:1px solid #2a3a2a;background:#1e2a1e;color:#5cb85c;font-size:18px;font-weight:700;cursor:pointer;margin-top:.5rem}
.bact:disabled{opacity:.4;cursor:not-allowed}
.bsec{width:100%;padding:1.1rem;border-radius:12px;border:1px solid #2a2a3a;background:#1e1e2a;color:#6c8eff;font-size:18px;font-weight:700;cursor:pointer;margin-top:.5rem}
.bsec:disabled{opacity:.4;cursor:not-allowed}
.srow{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0;border-bottom:1px solid #1e1e1e}
.srow:last-child{border-bottom:none}
.sk{font-size:17px;color:#666}
.sv{font-size:17px;color:#e8e8e8;font-weight:600;text-align:right;max-width:60%;word-break:break-all}
.bdg{display:inline-block;padding:5px 14px;border-radius:20px;font-size:16px;font-weight:700}
.bg{background:#1a2e1a;color:#5cb85c;border:1px solid #2a3e2a}
.br{background:#2e1a1a;color:#e05c5c;border:1px solid #3e2a2a}
.ba{background:#2e251a;color:#e0a05c;border:1px solid #3e351a}
.rbox{background:#1a1a1a;border:1px solid #222;border-radius:12px;padding:1rem;margin-top:.75rem}
.err{background:#2a1a1a;border:1px solid #3a2a2a;border-radius:12px;padding:1rem;font-size:17px;color:#e05c5c;margin-top:.75rem}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #333;border-top-color:#6c8eff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.pitm{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:.85rem;margin-bottom:.5rem}
.ptop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pnm{font-size:14px;color:#777;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pst{display:flex;gap:12px;margin-top:4px}
.psv{font-size:16px;color:#6c8eff;font-weight:600}
.psv span{color:#555;font-weight:400;font-size:13px}
.logbox{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:10px;padding:.85rem;margin-top:.75rem;font-family:monospace;font-size:13px;color:#888;white-space:pre-wrap;word-break:break-all;max-height:280px;overflow-y:auto;line-height:1.6}
.logout{width:100%;padding:.85rem;background:none;border:none;color:#333;font-size:15px;cursor:pointer;margin-top:.5rem}

.admin-section{margin-top:1.5rem;border-top:1px solid #2a2a2a;padding-top:1.5rem}
.admin-title{font-size:13px;font-weight:700;color:#e05c5c;letter-spacing:.8px;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.admin-title::before{content:'';display:inline-block;width:8px;height:8px;background:#e05c5c;border-radius:50%}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem}
.badm{padding:.85rem .5rem;border-radius:10px;border:1px solid #3a2a2a;background:#1e1010;color:#e05c5c;font-size:14px;font-weight:700;cursor:pointer;text-align:center;line-height:1.3}
.badm:disabled{opacity:.3;cursor:not-allowed}
.badm:active:not(:disabled){transform:scale(.97)}
.badm.warn{border-color:#3a2a1a;background:#1e1510;color:#e0a05c}
.badm.safe{border-color:#2a3a1a;background:#151e10;color:#8cb85c}
.badm.full{grid-column:1 / -1}
.alog{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:10px;padding:.85rem;margin-top:.75rem;font-family:monospace;font-size:13px;color:#aaa;line-height:1.8;min-height:80px;max-height:220px;overflow-y:auto;display:none}
.ll{display:block}.ll.ok{color:#5cb85c}.ll.err{color:#e05c5c}.ll.info{color:#6c8eff}.ll.warn{color:#e0a05c}
.moverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:1.5rem}
.moverlay.active{display:flex}
.modal{background:#1a1a1a;border:1px solid #3a2a2a;border-radius:16px;padding:1.5rem;width:100%;max-width:380px}
.modal h3{font-size:20px;font-weight:700;margin-bottom:.5rem;color:#e05c5c}
.modal p{font-size:15px;color:#888;margin-bottom:1.5rem;line-height:1.5}
.mbtns{display:flex;gap:.75rem}
.mcancel{flex:1;padding:.85rem;border-radius:10px;border:1px solid #333;background:#111;color:#888;font-size:15px;font-weight:600;cursor:pointer}
.mconfirm{flex:1;padding:.85rem;border-radius:10px;border:none;background:#e05c5c;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">DA</div>
  <div><h1>DIS ARG Ops</h1><p>Infrastructure control</p></div>
  <div class="ubadge" id="ubadge"></div>
</div>

<div id="login-section">
  <div class="lcrd">
    <h2>Bienvenido</h2>
    <p>Ingresa con tu cuenta de GitHub para continuar.</p>
    <button class="btn-gh" id="btn-login">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      Iniciar sesion con GitHub
    </button>
  </div>
</div>

<div id="dash-section">
  <div class="dash-hdr">Estado general</div>
  <button class="ref-btn" id="btn-refresh">Actualizar todo</button>
  <div id="cgrid"></div>
  <button class="logout" id="btn-logout-dash">Cerrar sesion</button>
</div>

<div id="detail-section">
  <button class="back" id="btn-back">&#8592; Volver</button>
  <div class="dname" id="dname"></div>
  <div class="slbl">Base de datos</div>
  <button class="bact" id="btn-rds" data-label="Consultar RDS">Consultar RDS</button>
  <div id="rds-result"></div>
  <div class="slbl">Sitio web</div>
  <button class="bsec" id="btn-health" data-label="Health check">Health check</button>
  <div id="health-result"></div>
  <div class="slbl">Pods</div>
  <button class="bsec" id="btn-pods" data-label="Ver pods">Ver pods</button>
  <div id="pods-result"></div>
  <div class="slbl">Logs de Odoo</div>
  <button class="bsec" id="btn-logs" data-label="Ver ultimas 50 lineas">Ver ultimas 50 lineas</button>
  <div id="logs-result"></div>
  
  <div class="admin-section">
    <div class="admin-title">Administracion</div>
    <div class="admin-grid">
      <button class="badm safe" id="btn-rpods">Restart<br>Pods</button>
      <button class="badm warn" id="btn-reasy">Restart<br>Easy</button>
      <button class="badm" id="btn-rglobal">Restart<br>Global</button>
      <button class="badm warn" id="btn-stopdb">Bajar<br>DB</button>
      <button class="badm safe full" id="btn-startdb">Subir DB</button>
    </div>
    <div class="alog" id="alog"></div>
  </div>
  <div class="moverlay" id="modal">
    <div class="modal">
      <h3 id="mtitle">Confirmar</h3>
      <p id="mbody">Esta accion afectara produccion.</p>
      <div class="mbtns">
        <button class="mcancel" id="mcancel">Cancelar</button>
        <button class="mconfirm" id="mconfirm">Confirmar</button>
      </div>
    </div>
  </div>
<button class="logout" id="btn-logout-detail">Cerrar sesion</button>
</div>

<script>
var API = "https://nr8qjpcl4d.execute-api.us-east-1.amazonaws.com/prod/action";
var GH_CLIENT = "Ov23li09kKMNZA4am0BO";
var REDIRECT = "https://disarg-org.github.io/ops-panel/callback.html";
var CLIENTS = ["cascadas","basso","dls","valimartsrl","sursports","domstor"];
var token = localStorage.getItem("ops_github_token");
var curClient = null;

window.onload = function() {
  if (token) { showDash(); loadDash(); }
};

document.getElementById("btn-login").onclick = function() {
  var s = Math.random().toString(36).substring(2);
  sessionStorage.setItem("oauth_state", s);
  window.location.href = "https://github.com/login/oauth/authorize?client_id=" + GH_CLIENT + "&redirect_uri=" + encodeURIComponent(REDIRECT) + "&scope=read:user&state=" + s;
};

document.getElementById("btn-refresh").onclick = loadDash;
document.getElementById("btn-back").onclick = showDash;
document.getElementById("btn-logout-dash").onclick = logout;
document.getElementById("btn-logout-detail").onclick = logout;
document.getElementById("btn-rds").onclick = getRds;
document.getElementById("btn-health").onclick = getHealth;
document.getElementById("btn-pods").onclick = getPods;
document.getElementById("btn-logs").onclick = getLogs;

function logout() {
  localStorage.removeItem("ops_github_token");
  localStorage.removeItem("ops_github_user");
  token = null;
  show("login-section");
}

function show(id) {
  ["login-section","dash-section","detail-section"].forEach(function(s) {
    document.getElementById(s).style.display = s === id ? "block" : "none";
  });
}

function showDash() {
  show("dash-section");
  var u = localStorage.getItem("ops_github_user") || "";
  var b = document.getElementById("ubadge");
  b.textContent = u; b.style.display = "block";
}

function showDetail(client) {
  curClient = client;
  document.getElementById("dname").textContent = client;
  ["rds-result","health-result","pods-result","logs-result"].forEach(function(id) {
    document.getElementById(id).innerHTML = "";
  });
  ["btn-rds","btn-health","btn-pods","btn-logs"].forEach(function(id) {
    var b = document.getElementById(id);
    b.disabled = false;
    b.innerHTML = b.getAttribute("data-label");
  });
  show("detail-section");
}

function api(action, client, extra) {
  var body = Object.assign({github_token: token, action: action, client: client}, extra || {});
  return fetch(API, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body)})
    .then(function(r) {
      return r.json().then(function(d) {
        if (r.status === 401 || r.status === 403) { logout(); throw new Error(d.error || "Sin acceso"); }
        if (!r.ok) throw new Error(d.error || "Error");
        return d;
      });
    });
}

function badge(s) {
  if (s === "available" || s === "Running") return '<span class="bdg bg">' + s + '</span>';
  if (s === "stopped" || s === "Failed") return '<span class="bdg br">' + s + '</span>';
  if (s === "starting" || s === "Pending" || s === "CrashLoopBackOff") return '<span class="bdg ba">' + s + '</span>';
  return '<span class="bdg">' + s + '</span>';
}

function ldg(btnId, lbl) { var b=document.getElementById(btnId); b.disabled=true; b.innerHTML='<span class="spin"></span>'+lbl; }
function dne(btnId) { var b=document.getElementById(btnId); b.disabled=false; b.innerHTML=b.getAttribute("data-label"); }

// DASHBOARD
function loadDash() {
  var grid = document.getElementById("cgrid");
  grid.innerHTML = CLIENTS.map(function(c) {
    return '<div class="ccrd" id="card-'+c+'" data-client="'+c+'">' +
      '<div class="ccrd-top"><span class="cname">'+c+'</span><div class="sem" id="sem-'+c+'"></div></div>' +
      '<div class="pills" id="pills-'+c+'"><span class="pill">Cargando...</span></div>' +
      '</div>';
  }).join("");
  document.getElementById("cgrid").addEventListener("click", function(e) {
    var card = e.target.closest(".ccrd");
    if (card) showDetail(card.getAttribute("data-client"));
  });
  CLIENTS.forEach(function(c) {
    loadStatus(c);
  });
}

function setSem(client, color) {
  document.getElementById("sem-"+client).className = "sem " + color;
  document.getElementById("card-"+client).className = "ccrd " + color;
}

function setPills(client, html) {
  document.getElementById("pills-"+client).innerHTML = html;
}

function loadStatus(client) {
  Promise.all([
    api("rds_status", client),
    api("pod_status", client),
    api("pod_metrics", client).catch(function() { return {metrics:[]}; })
  ]).then(function(results) {
    var rds = results[0];
    var pods = results[1];
    var met = results[2];

    var mmap = {};
    (met.metrics || []).forEach(function(m) { mmap[m.name] = m; });

    var rdsOk = rds.status === "available";
    var cpu = rds.cpu_pct;
    var mem = rds.mem_pct;
    var warnFlag = cpu > 15 || mem > 85;
    var critFlag = cpu > 30 || mem > 95 || !rdsOk;

    var mainPod = null;
    (pods.pods || []).forEach(function(p) {
      if (p.name.indexOf("main-odoo") >= 0 && p.phase === "Running" && !p.name.match(/scale|rds-stop|staging|sync/)) mainPod = p;
    });
    var podUp = mainPod && mainPod.phase === "Running" && mainPod.ready;

    var color = "green";
    if (critFlag || !podUp) color = "red";
    else if (warnFlag) color = "amber";

    setSem(client, color);

    var cpuCls = cpu > 30 ? "crit" : cpu > 15 ? "warn" : "ok";
    var memCls = mem > 95 ? "crit" : mem > 85 ? "warn" : "ok";
    var rdsCls = rdsOk ? "ok" : "crit";
    var podCls = podUp ? "ok" : "crit";
    var podTxt = podUp ? "UP" : "DOWN";
    var mainM = mainPod ? mmap[mainPod.name] : null;
    var metHtml = mainM ? '<span class="pill ok">'+mainM.cpu_m+'m/'+mainM.mem_mi+'Mi</span>' : "";

    setPills(client,
      '<span class="pill '+rdsCls+'">'+rds.status+'</span>' +
      '<span class="pill '+cpuCls+'">CPU '+(cpu!==null?cpu+"%":"--")+'</span>' +
      '<span class="pill '+memCls+'">RAM '+(mem!==null?mem+"%":"--")+'</span>' +
      metHtml +
      '<span class="pill '+podCls+'">Pods '+podTxt+'</span>'
    );
  }).catch(function(e) {
    setSem(client, "red");
    setPills(client, '<span class="pill crit">'+e.message+'</span>');
  });
}

function loadHealth(client) {
  api("health_check", client).then(function(d) {
    var ok = d.ok;
    setSem(client, ok ? "green" : "red");
    setPills(client,
      '<span class="pill '+(ok?"ok":"crit")+'">'+(ok?"200 OK":d.status||"Error")+'</span>' +
      '<span class="pill ok">'+(d.response_ms?d.response_ms+"ms":"--")+'</span>'
    );
  }).catch(function(e) {
    setSem(client, "red");
    setPills(client, '<span class="pill crit">Error</span>');
  });
}

// DETALLE
function getRds() {
  ldg("btn-rds","Consultando...");
  var r = document.getElementById("rds-result"); r.innerHTML = "";
  api("rds_status", curClient).then(function(d) {
    r.innerHTML = '<div class="rbox">' +
      '<div class="srow"><span class="sk">Estado</span><span class="sv">'+badge(d.status)+'</span></div>' +
      '<div class="srow"><span class="sk">CPU</span><span class="sv">'+(d.cpu_pct!==null?d.cpu_pct+"%":"--")+'</span></div>' +
      '<div class="srow"><span class="sk">Memoria</span><span class="sv">'+(d.mem_pct!==null?d.mem_pct+"%":"--")+'</span></div>' +
      '<div class="srow"><span class="sk">Conexiones</span><span class="sv">'+(d.connections!==null?d.connections:"--")+'</span></div>' +
      '<div class="srow"><span class="sk">Instancia</span><span class="sv">'+d.class+'</span></div>' +
      '<div class="srow"><span class="sk">Motor</span><span class="sv">'+d.engine+'</span></div>' +
      '<div class="srow"><span class="sk">Storage</span><span class="sv">'+d.storage_gb+' GB</span></div>' +
      '</div>';
  }).catch(function(e) { r.innerHTML = '<div class="err">'+e.message+'</div>'; })
  .finally(function() { dne("btn-rds"); });
}

function getHealth() {
  ldg("btn-health","Verificando...");
  var r = document.getElementById("health-result"); r.innerHTML = "";
  api("health_check", curClient).then(function(d) {
    var b = d.ok ? '<span class="bdg bg">200 OK</span>' : '<span class="bdg br">'+(d.status||"Error")+'</span>';
    r.innerHTML = '<div class="rbox">' +
      '<div class="srow"><span class="sk">Estado</span><span class="sv">'+b+'</span></div>' +
      '<div class="srow"><span class="sk">Tiempo</span><span class="sv">'+(d.response_ms?d.response_ms+"ms":"--")+'</span></div>' +
      '</div>';
  }).catch(function(e) { r.innerHTML = '<div class="err">'+e.message+'</div>'; })
  .finally(function() { dne("btn-health"); });
}

function getPods() {
  ldg("btn-pods","Consultando...");
  var r = document.getElementById("pods-result"); r.innerHTML = "";
  Promise.all([
    api("pod_status", curClient),
    api("pod_metrics", curClient).catch(function() { return {metrics:[]}; })
  ]).then(function(res) {
    var pods = res[0]; var met = res[1];
    var mm = {}; (met.metrics||[]).forEach(function(m) { mm[m.name]=m; });
    if (!pods.pods || pods.pods.length === 0) { r.innerHTML = '<div class="err">Sin pods</div>'; return; }
    r.innerHTML = '<div style="margin-top:.5rem">' + pods.pods.map(function(p) {
      var m = mm[p.name];
      return '<div class="pitm">' +
        '<div class="ptop"><span class="pnm">'+p.name+'</span>'+badge(p.phase)+'</div>' +
        '<div class="pst">' +
        '<span class="psv"><span>CPU </span>'+(m?m.cpu_m+"m":"--")+'</span>' +
        '<span class="psv"><span>RAM </span>'+(m?m.mem_mi+"Mi":"--")+'</span>' +
        '<span class="psv"><span>Reinic. </span>'+p.restarts+'</span>' +
        '</div></div>';
    }).join("") + '</div>';
  }).catch(function(e) { r.innerHTML = '<div class="err">'+e.message+'</div>'; })
  .finally(function() { dne("btn-pods"); });
}

function getLogs() {
  ldg("btn-logs","Cargando...");
  var r = document.getElementById("logs-result"); r.innerHTML = "";
  api("pod_logs", curClient).then(function(d) {
    r.innerHTML = '<div style="margin-top:.5rem;font-size:11px;color:#444;margin-bottom:4px">'+d.pod+'</div>' +
      '<div class="logbox">'+d.logs.replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>';
  }).catch(function(e) { r.innerHTML = '<div class="err">'+e.message+'</div>'; })
  .finally(function() { dne("btn-logs"); });
}

// ADMIN
var adminPending = null;
var polling = null;

function alog(msg, cls) {
  var box = document.getElementById("alog");
  box.style.display = "block";
  var line = document.createElement("span");
  line.className = "ll " + (cls||"");
  line.textContent = msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function alogClear() {
  var box = document.getElementById("alog");
  box.innerHTML = "";
  box.style.display = "block";
}

function stopPolling() { if (polling) { clearInterval(polling); polling = null; } }

function setAdminBtns(disabled) {
  ["btn-rpods","btn-reasy","btn-rglobal","btn-stopdb","btn-startdb"].forEach(function(id) {
    var b = document.getElementById(id);
    if (b) b.disabled = disabled;
  });
}

function updateAdminBtnStates(rdsStatus) {
  var avail = rdsStatus === "available";
  var stopped = rdsStatus === "stopped";
  var busy = !avail && !stopped;
  document.getElementById("btn-rpods").disabled = false;
  document.getElementById("btn-reasy").disabled = !avail;
  document.getElementById("btn-rglobal").disabled = !avail;
  document.getElementById("btn-stopdb").disabled = !avail;
  document.getElementById("btn-startdb").disabled = !stopped;
}

function showModal(title, body, onConfirm) {
  document.getElementById("mtitle").textContent = title;
  document.getElementById("mbody").textContent = body;
  document.getElementById("modal").className = "moverlay active";
  adminPending = onConfirm;
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("mcancel").onclick = function() {
    document.getElementById("modal").className = "moverlay";
    adminPending = null;
  };
  document.getElementById("mconfirm").onclick = function() {
    document.getElementById("modal").className = "moverlay";
    if (adminPending) { adminPending(); adminPending = null; }
  };

  document.getElementById("btn-rpods").onclick = function() {
    showModal("Restart Pods", "Se reiniciaran los pods de Odoo y nginx en " + curClient + ". El sitio estara offline ~30 segundos.", function() {
      alogClear();
      setAdminBtns(true);
      alog("Iniciando restart de pods...", "info");
      api("restart_pods", curClient).then(function(d) {
        alog("Restart enviado: " + d.restarted.join(", "), "ok");
        alog("Esperando que los pods levanten...", "info");
        var checks = 0;
        polling = setInterval(function() {
          checks++;
          api("pod_status", curClient).then(function(p) {
            var main = p.pods.filter(function(x) { return x.name.indexOf("main-odoo") >= 0 && x.phase === "Running" && x.ready; });
            if (main.length > 0) {
              alog("Pods Running y Ready ✓", "ok");
              stopPolling(); setAdminBtns(false);
            } else {
              alog("Pods reiniciando... (" + (checks*5) + "s)", "warn");
              if (checks > 24) { alog("Timeout — verificar manualmente", "err"); stopPolling(); setAdminBtns(false); }
            }
          }).catch(function() { alog("Error consultando pods", "err"); stopPolling(); setAdminBtns(false); });
        }, 5000);
      }).catch(function(e) { alog("Error: " + e.message, "err"); setAdminBtns(false); });
    });
  };

  document.getElementById("btn-reasy").onclick = function() {
    showModal("Restart Easy", "Se hara reboot de la DB y restart de pods en " + curClient + ". Tiempo estimado: 2-3 minutos.", function() {
      alogClear(); setAdminBtns(true);
      alog("Iniciando reboot de RDS...", "info");
      api("reboot_rds", curClient).then(function() {
        alog("Reboot RDS enviado, esperando...", "ok");
        pollRds(["rebooting","available"], "available", function() {
          alog("RDS available ✓ Reiniciando pods...", "ok");
          api("restart_pods", curClient).then(function(d) {
            alog("Pods reiniciando: " + d.restarted.join(", "), "info");
            pollPods(function() { alog("Todo listo ✓", "ok"); setAdminBtns(false); updateAdminBtnStates("available"); });
          }).catch(function(e) { alog("Error pods: " + e.message, "err"); setAdminBtns(false); });
        });
      }).catch(function(e) { alog("Error RDS: " + e.message, "err"); setAdminBtns(false); });
    });
  };

  document.getElementById("btn-rglobal").onclick = function() {
    showModal("Restart Global", "Se bajaran los pods, se hara stop/start completo de la DB y se volvera a levantar todo en " + curClient + ". Tiempo estimado: 5-8 minutos.", function() {
      alogClear(); setAdminBtns(true);
      alog("Bajando pods a 0...", "info");
      api("scale_pods", curClient, {replicas:0}).then(function() {
        alog("Pods bajando...", "warn");
        pollPodsDown(function() {
          alog("Pods en 0 ✓ Deteniendo RDS...", "ok");
          api("stop_rds", curClient).then(function() {
            alog("Stop RDS enviado...", "warn");
            pollRds(["stopping","stopped"], "stopped", function() {
              alog("RDS stopped ✓ Iniciando RDS...", "ok");
              api("start_rds", curClient).then(function() {
                alog("Start RDS enviado...", "info");
                pollRds(["starting","available"], "available", function() {
                  alog("RDS available ✓ Subiendo pods...", "ok");
                  api("scale_pods", curClient, {replicas:1}).then(function() {
                    pollPods(function() { alog("Todo listo ✓", "ok"); setAdminBtns(false); updateAdminBtnStates("available"); });
                  }).catch(function(e) { alog("Error scale up: " + e.message, "err"); setAdminBtns(false); });
                });
              }).catch(function(e) { alog("Error start RDS: " + e.message, "err"); setAdminBtns(false); });
            });
          }).catch(function(e) { alog("Error stop RDS: " + e.message, "err"); setAdminBtns(false); });
        });
      }).catch(function(e) { alog("Error scale down: " + e.message, "err"); setAdminBtns(false); });
    });
  };

  document.getElementById("btn-stopdb").onclick = function() {
    showModal("Bajar DB", "Se bajaran los pods y se detendra la RDS de " + curClient + ". El sitio quedara offline hasta que subas la DB.", function() {
      alogClear(); setAdminBtns(true);
      alog("Bajando pods a 0...", "info");
      api("scale_pods", curClient, {replicas:0}).then(function() {
        pollPodsDown(function() {
          alog("Pods en 0 ✓ Deteniendo RDS...", "ok");
          api("stop_rds", curClient).then(function() {
            pollRds(["stopping","stopped"], "stopped", function() {
              alog("RDS stopped ✓ Listo.", "ok");
              setAdminBtns(false); updateAdminBtnStates("stopped");
            });
          }).catch(function(e) { alog("Error: " + e.message, "err"); setAdminBtns(false); });
        });
      }).catch(function(e) { alog("Error: " + e.message, "err"); setAdminBtns(false); });
    });
  };

  document.getElementById("btn-startdb").onclick = function() {
    showModal("Subir DB", "Se iniciara la RDS y se levantaran los pods de " + curClient + ".", function() {
      alogClear(); setAdminBtns(true);
      alog("Iniciando RDS...", "info");
      api("start_rds", curClient).then(function() {
        pollRds(["starting","available"], "available", function() {
          alog("RDS available ✓ Subiendo pods...", "ok");
          api("scale_pods", curClient, {replicas:1}).then(function() {
            pollPods(function() { alog("Todo listo ✓", "ok"); setAdminBtns(false); updateAdminBtnStates("available"); });
          }).catch(function(e) { alog("Error: " + e.message, "err"); setAdminBtns(false); });
        });
      }).catch(function(e) { alog("Error: " + e.message, "err"); setAdminBtns(false); });
    });
  };
});

function pollRds(transitional, target, onDone) {
  var checks = 0;
  polling = setInterval(function() {
    checks++;
    api("rds_status", curClient).then(function(d) {
      alog("RDS: " + d.status + " (" + (checks*8) + "s)", transitional.indexOf(d.status) >= 0 ? "warn" : "info");
      if (d.status === target) { stopPolling(); onDone(); }
      if (checks > 75) { alog("Timeout RDS", "err"); stopPolling(); setAdminBtns(false); }
    }).catch(function() { alog("Error consultando RDS", "err"); });
  }, 8000);
}

function pollPods(onDone) {
  var checks = 0;
  polling = setInterval(function() {
    checks++;
    api("pod_status", curClient).then(function(p) {
      var main = p.pods.filter(function(x) { return x.name.indexOf("main-odoo") >= 0 && x.phase === "Running" && x.ready; });
      alog("Pods Running: " + main.length + " (" + (checks*5) + "s)", main.length > 0 ? "ok" : "warn");
      if (main.length > 0) { stopPolling(); onDone(); }
      if (checks > 24) { alog("Timeout pods", "err"); stopPolling(); setAdminBtns(false); }
    }).catch(function() { alog("Error consultando pods", "err"); });
  }, 5000);
}

function pollPodsDown(onDone) {
  var checks = 0;
  polling = setInterval(function() {
    checks++;
    api("pod_status", curClient).then(function(p) {
      var running = p.pods.filter(function(x) { return x.phase === "Running" && (x.name.indexOf("main-odoo") >= 0 || x.name.indexOf("nginx-proxy") >= 0); });
      alog("Pods activos: " + running.length + " (" + (checks*5) + "s)", running.length === 0 ? "ok" : "warn");
      if (running.length === 0) { stopPolling(); onDone(); }
      if (checks > 12) { alog("Timeout bajando pods", "err"); stopPolling(); setAdminBtns(false); }
    }).catch(function() { alog("Error consultando pods", "err"); });
  }, 5000);
}

</script>
</body>
